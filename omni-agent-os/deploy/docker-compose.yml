version: '3.8'
services:
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: nacos-standalone
    environment:
      - MODE=standalone
      - JVM_XMS=512m
      - JVM_XMX=512m
    ports:
      - "8848:8848"
      - "9848:9848"
    restart: always

  mysql:
    image: mysql:8.0
    container_name: mysql-v8
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=omni_agent_db
    ports:
      - "3307:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
    restart: always

  redis:
    image: redis:7.0
    container_name: redis-v7
    ports:
      - "6379:6379"
    restart: always

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq-v3
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always